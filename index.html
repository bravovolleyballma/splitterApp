<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Expense Splitter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2, h3 { margin-top: 0; color: #2c3e50; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 16px; font-weight: bold; cursor: pointer; color: #7f8c8d; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab-btn.active { color: #3498db; border-bottom: 2px solid #3498db; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        .search-box { margin-bottom: 5px; font-size: 14px; padding: 6px 10px; border: 1px dashed #3498db; }
        .checkbox-group { background: #f9f9f9; padding: 10px; border: 1px solid #ccc; border-radius: 6px; max-height: 120px; overflow-y: auto; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 16px; }
        .checkbox-item.hidden { display: none; }
        .checkbox-item input { width: auto; margin-right: 10px; transform: scale(1.2); }
        button.submit-btn { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button.submit-btn:hover { background-color: #27ae60; }
        .section-block { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .balance-item { display: flex; justify-content: space-between; padding: 8px 12px; background: #f9f9f9; border-radius: 6px; margin-bottom: 6px; font-weight: 500; }
        .pos { color: #27ae60; background: #e8f8f0; }
        .neg { color: #c0392b; background: #fceae9; }
        .history-item { background: #f9f9f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #3498db; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💸 Splitwise Lite</h2>
    
    <!-- Balance Dashboard -->
    <div style="margin-bottom:20px;">
        <h3>📊 Current Status</h3>
        <div id="balancesBox">Loading balances...</div>
    </div>

    <!-- Navigation Tabs -->
    <div class="tabs">
        <button class="tab-btn active" id="tabExp" onclick="switchTab('expensePanel', 'tabExp')">➕ Add Expense</button>
        <button class="tab-btn" id="tabUser" onclick="switchTab('userPanel', 'tabUser')">👤 Create User</button>
    </div>

    <!-- PANEL 1: EXPENSE FORM -->
    <div id="expensePanel" class="panel active">
        <form id="expenseForm">
            <div class="form-group">
                <label for="payerSearch">Search & Select Payer</label>
                <input type="text" id="payerSearch" class="search-box" placeholder="Type name to filter list..." onkeyup="filterDropdown()">
                <select id="payer" required>
                    <option value="">Loading users...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="amount">Amount (\$)</label>
                <input type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label for="description">For What?</label>
                <input type="text" id="description" placeholder="e.g. Dinner, Groceries" required>
            </div>
            <div class="form-group">
                <label>Split With</label>
                <input type="text" id="splitSearch" class="search-box" placeholder="Type name to filter list..." onkeyup="filterCheckboxes()">
                <div id="splitWithContainer" class="checkbox-group">
                    <span style="color:#7f8c8d; font-size:14px;">Loading users...</span>
                </div>
            </div>
            <button type="submit" class="submit-btn">Sync Transaction</button>
        </form>
    </div>

    <!-- PANEL 2: USER CREATION FORM -->
    <div id="userPanel" class="panel">
        <form id="userForm">
            <div class="form-group">
                <label for="newUserName">Unique Full Name</label>
                <input type="text" id="newUserName" placeholder="e.g. Alice Smith" required>
            </div>
            <div class="form-group">
                <label for="newUserEmail">Email Address</label>
                <input type="email" id="newUserEmail" placeholder="e.g. alice@email.com" required>
            </div>
            <div class="form-group">
                <label for="newUserPhone">Phone Number</label>
                <input type="tel" id="newUserPhone" placeholder="e.g. 555-0199" required>
            </div>
            <button type="submit" class="submit-btn" style="background-color: #3498db;">Add User to Database</button>
        </form>
    </div>

    <!-- History Log -->
    <div class="section-block">
        <h3>📅 Recent Expenses</h3>
        <div id="expensesLog">Loading history...</div>
    </div>
</div>

<script>
    // ⚠️ REPLACE WITH YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP URL
    const API_URL = "https://script.google.com/macros/s/AKfycbwdrjNcPErvDtCk0KXBs4CM75vvWsqM0TJGGodVTmrqihNFVS0isglPw1X5qdefbhjQ-w/exec";

    let masterUserList = [];

    // Tab switcher logic
    function switchTab(panelId, btnId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(panelId).classList.add('active');
        document.getElementById(btnId).classList.add('active');
    }

    // Filter dropdown items
    function filterDropdown() {
        const filter = document.getElementById('payerSearch').value.toLowerCase();
        const select = document.getElementById('payer');
        select.innerHTML = '<option value="">-- Choose Payer --</option>';
        masterUserList.forEach(user => {
            if (user.toLowerCase().includes(filter)) {
                const opt = document.createElement('option');
                opt.value = user;
                opt.textContent = user;
                select.appendChild(opt);
            }
        });
    }

    // Filter checkbox items
    function filterCheckboxes() {
        const filter = document.getElementById('splitSearch').value.toLowerCase();
        const items = document.querySelectorAll('.checkbox-item');
        items.forEach(item => {
            if (item.textContent.toLowerCase().includes(filter)) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
    }

    // Core initial data pull
    function loadInitialData() {
        fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            masterUserList = data.users || [];
            buildUserInterfaces(masterUserList);
            displayBalances(data.balances);
            displayHistory(data.transactions);
        })
        .catch(err => {
            console.error(err);
            document.getElementById('balancesBox').innerHTML = 'Sync engine unreachable.';
        });
    }

    function buildUserInterfaces(users) {
        const payerSelect = document.getElementById('payer');
        const splitContainer = document.getElementById('splitWithContainer');
        
        payerSelect.innerHTML = '<option value="">-- Choose Payer --</option>';
        splitContainer.innerHTML = '';

        users.forEach(user => {
            const opt = document.createElement('option');
            opt.value = user; 
            opt.textContent = user;
            payerSelect.appendChild(opt);

            const label = document.createElement('label');
            label.className = 'checkbox-item';
            label.innerHTML = '<input type="checkbox" name="splitUsers" value="' + user + '"> ' + user;
            splitContainer.appendChild(label);
        });
    }

    // Submit user form
    document.getElementById('userForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = {
            action: "createUser",
            name: document.getElementById('newUserName').value.trim(),
            email: document.getElementById('newUserEmail').value.trim(),
            phone: document.getElementById('newUserPhone').value.trim()
        };

        fetch(API_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                alert('User added successfully!');
                document.getElementById('userForm').reset();
                switchTab('expensePanel', 'tabExp');
                loadInitialData();
            } else { 
                alert('Error: ' + data.message); 
            }
        });
    });

    // Submit expense form
    document.getElementById('expenseForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const checkedBoxes = document.querySelectorAll('input[name="splitUsers"]:checked');
        const selectedUsers = Array.from(checkedBoxes).map(cb => cb.value);

        if (selectedUsers.length === 0) { 
            alert('Select at least one person to split with.'); 
            return; 
        }

const payload = {action: "createTransaction",payer: document.getElementById('payer').value,amount: document.getElementById('amount').value,description: document.getElementById('description').value.trim(),splitWith: selectedUsers.join(', ')};fetch(API_URL, { method: 'POST', redirect: 'follow', body: JSON.stringify(payload) }).then(res => res.json()).then(data => {if(data.status === 'success') {alert('Expense synchronized!');document.getElementById('expenseForm').reset();loadInitialData();}});});function displayBalances(balances) {const box = document.getElementById('balancesBox');box.innerHTML = '';if(!balances || balances.length === 0) {box.innerHTML = 'No data.';return;}balances.forEach(user => {const div = document.createElement('div');const amt = parseFloat(user.net || 0);div.className = 'balance-item ' + (amt >= 0 ? 'pos' : 'neg');div.innerHTML = '' + user.name + ' ' + (amt >= 0 ? 'Gets back' : 'Owes') + ': $' + Math.abs(amt).toFixed(2) + '';box.appendChild(div);});}function displayHistory(transactions) {const log = document.getElementById('expensesLog');log.innerHTML = '';if(!transactions || transactions.length === 0) {log.innerHTML = 'No entries.';return;}transactions.slice(-5).reverse().forEach(item => {const div = document.createElement('div');div.className = 'history-item';div.innerHTML = '' + item.Payer + ' paid $' + parseFloat(item.Amount).toFixed(2) + ' for ' + item.Description + 'Split with: ' + item.SplitWith + '';log.appendChild(div);});}loadInitialData();
