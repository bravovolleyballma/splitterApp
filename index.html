<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Expense Splitter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2, h3 { margin-top: 0; color: #2c3e50; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 14px; font-weight: bold; cursor: pointer; color: #7f8c8d; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab-btn.active { color: #3498db; border-bottom: 2px solid #3498db; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        .search-box { margin-bottom: 5px; font-size: 14px; padding: 6px 10px; border: 1px dashed #3498db; }
        .checkbox-group { background: #f9f9f9; padding: 10px; border: 1px solid #ccc; border-radius: 6px; max-height: 120px; overflow-y: auto; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 16px; }
        .checkbox-item.hidden { display: none; }
        .checkbox-item input { width: auto; margin-right: 10px; transform: scale(1.2); }
        button.submit-btn { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button.submit-btn:hover { background-color: #27ae60; }
        .section-block { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .balance-item { display: flex; justify-content: space-between; padding: 8px 12px; background: #f9f9f9; border-radius: 6px; margin-bottom: 6px; font-weight: 500; }
        .pos { color: #27ae60; background: #e8f8f0; }
        .neg { color: #c0392b; background: #fceae9; }
        .history-item { background: #f9f9f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #3498db; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💸 Splitwise Lite</h2>

    <!-- Navigation Tabs -->
    <div class="tabs">
        <button class="tab-btn active" id="tabExp" onclick="switchTab('expensePanel', 'tabExp')">➕ Expense</button>
        <button class="tab-btn" id="tabStatus" onclick="switchTab('statusPanel', 'tabStatus')">📊 Balances</button>
        <button class="tab-btn" id="tabUser" onclick="switchTab('userPanel', 'tabUser')">👤 User</button>
    </div>

    <!-- PANEL 1: EXPENSE FORM -->
    <div id="expensePanel" class="panel active">
        <form id="expenseForm">
            <div class="form-group">
                <label for="payer">Who Paid?</label>
                <input type="text" id="payer" list="userDatalist" placeholder="Type or click to select a user..." required>
                <datalist id="userDatalist"></datalist>
            </div>
            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label for="description">For What?</label>
                <input type="text" id="description" placeholder="e.g. Dinner, Groceries" required>
            </div>
            <div class="form-group">
                <label>Split With</label>
                <input type="text" id="splitSearch" class="search-box" placeholder="Type name to filter list..." onkeyup="filterCheckboxes()">
                <div id="splitWithContainer" class="checkbox-group">
                    <span style="color:#7f8c8d; font-size:14px;">Loading users...</span>
                </div>
            </div>
            <button type="submit" class="submit-btn">Sync Transaction</button>
        </form>
    </div>

    <!-- PANEL 2: CURRENT STATUS DASHBOARD -->
    <div id="statusPanel" class="panel">
        <h3>📊 Current Status</h3>
        <div id="balancesBox">Loading balances...</div>
    </div>

    <!-- PANEL 3: USER CREATION FORM -->
    <div id="userPanel" class="panel">
        <form id="userForm">
            <div class="form-group">
                <label for="newUserName">Unique Full Name</label>
                <input type="text" id="newUserName" placeholder="e.g. Alice Smith" required>
            </div>
            <div class="form-group">
                <label for="newUserEmail">Email Address</label>
                <input type="email" id="newUserEmail" placeholder="e.g. alice@email.com" required>
            </div>
            <div class="form-group">
                <label for="newUserPhone">Phone Number</label>
                <input type="tel" id="newUserPhone" placeholder="e.g. 555-0199" required>
            </div>
            <button type="submit" class="submit-btn" style="background-color: #3498db;">Add User to Database</button>
        </form>
    </div>

    <!-- History Log (Always visible at the bottom) -->
    <div class="section-block">
        <h3>📅 Recent Expenses</h3>
        <div id="expensesLog">Loading history...</div>
    </div>
</div>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwdrjNcPErvDtCk0KXBs4CM75vvWsqM0TJGGodVTmrqihNFVS0isglPw1X5qdefbhjQ-w/exec";
    let masterUserList = [];

    function switchTab(pId, bId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pId).classList.add('active');
        document.getElementById(bId).classList.add('active');
    }

    function filterCheckboxes() {
        const val = document.getElementById('splitSearch').value.toLowerCase();
        document.querySelectorAll('.checkbox-item').forEach(i => {
            if (i.textContent.toLowerCase().includes(val)) {
                i.classList.remove('hidden');
            } else {
                i.classList.add('hidden');
            }
        });
    }

    function loadInitialData() {
        fetch(API_URL)
        .then(r => r.json())
        .then(d => {
            masterUserList = d.users || [];
            buildUserInterfaces(masterUserList);
            displayBalances(d.balances);
            displayHistory(d.transactions);
        })
        .catch(e => {
            document.getElementById('balancesBox').innerHTML = 'Sync unreachable.';
        });
    }

    function buildUserInterfaces(arr) {
        const datalist = document.getElementById('userDatalist');
        const box = document.getElementById('splitWithContainer');
        datalist.innerHTML = '';
        box.innerHTML = '';
        arr.forEach(u => {
            const o = document.createElement('option');
            o.value = u;
            datalist.appendChild(o);

            const l = document.createElement('label');
            l.className = 'checkbox-item';
            l.innerHTML = '<input type="checkbox" name="splitUsers" value="' + u + '"> ' + u;
            box.appendChild(l);
        });
    }

    document.getElementById('userForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const p = {
            action: "createUser",
            name: document.getElementById('newUserName').value.trim(),
            email: document.getElementById('newUserEmail').value.trim(),
            phone: document.getElementById('newUserPhone').value.trim()
        };
        fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(p) })
        .then(() => {
            alert('User request sent!');
            document.getElementById('userForm').reset();
            switchTab('expensePanel', 'tabExp');
            setTimeout(loadInitialData, 2000);
        });
    });

    document.getElementById('expenseForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const checked = document.querySelectorAll('input[name="splitUsers"]:checked');
        const users = Array.from(checked).map(c => c.value);
        const chosenPayer = document.getElementById('payer').value.trim();
        
        if (!masterUserList.includes(chosenPayer)) {
            alert('Please select a valid user from the database prompts!');
            return;
        }
        if (users.length === 0) { alert('Select split users.'); return; }
        
        const p = {
            action: "createTransaction",
            payer: chosenPayer,
            amount: document.getElementById('amount').value,
            description: document.getElementById('description').value.trim(),
            splitWith: users.join(', ')
        };
        fetch(API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(p) })
        .then(() => {
            alert('Expense submission sent!');
            document.getElementById('expenseForm').reset();
            setTimeout(loadInitialData, 2000);
        });
    });

    function displayBalances(arr) {
        const b = document.getElementById('balancesBox'); b.innerHTML = '';
        if(!arr || arr.length === 0) { b.innerHTML = 'No data.'; return; }
        arr.forEach(u => {
            const div = document.createElement('div');
            const num = parseFloat(u.net || 0);
            div.className = 'balance-item ' + (num >= 0 ? 'pos' : 'neg');
            div.innerHTML = '<span>' + u.name + '</span> <span>' + (num >= 0 ? 'Gets back' : 'Owes') + ': $' + Math.abs(num).toFixed(2) + '</span>';
            b.appendChild(div);
        });
    }

    function displayHistory(arr) {
        const l = document.getElementById('expensesLog'); l.innerHTML = '';
        if(!arr || arr.length === 0) { l.innerHTML = 'No items.'; return; }
        arr.slice(-5).reverse().forEach(i => {
            const div = document.createElement('div'); div.className = 'history-item';
            div.innerHTML = '<strong>' + i.Payer + '</strong> paid <strong>$' + parseFloat(i.Amount).toFixed(2) + '</strong> for <em>' + i.Description + '</em><br><small>Split: ' + i.SplitWith + '</small>';
            l.appendChild(div);
        });
    }

    loadInitialData();
</script>
</body>
</html>
