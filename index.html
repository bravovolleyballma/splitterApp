<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Expense Splitter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2, h3 { margin-top: 0; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        .checkbox-group { background: #f9f9f9; padding: 10px; border: 1px solid #ccc; border-radius: 6px; max-height: 120px; overflow-y: auto; }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 16px; }
        .checkbox-item input { width: auto; margin-right: 10px; transform: scale(1.2); }
        button { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #27ae60; }
        .loading { text-align: center; color: #7f8c8d; font-style: italic; margin-top: 10px; }
        .history-list { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .history-item { background: #f9f9f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #3498db; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💸 Splitwise Lite</h2>
    
    <!-- Expense Form -->
    <form id="expenseForm">
        <div class="form-group">
            <label for="payer">Who Paid?</label>
            <select id="payer" required>
                <option value="">Loading users...</option>
            </select>
        </div>
        <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" step="0.01" placeholder="0.00" required>
        </div>
        <div class="form-group">
            <label for="description">For What?</label>
            <input type="text" id="description" placeholder="e.g. Dinner, Groceries" required>
        </div>
        <div class="form-group">
            <label>Split With</label>
            <div id="splitWithContainer" class="checkbox-group">
                <span style="color:#7f8c8d; font-size:14px;">Loading users...</span>
            </div>
        </div>
        <button type="submit">Sync Transaction</button>
        <div id="loadingStatus" class="loading" style="display: none;">Processing... Please wait.</div>
    </form>

    <!-- Simple History Viewer -->
    <div class="history-list">
        <h3>Recent Expenses</h3>
        <div id="expensesLog">Loading history...</div>
    </div>
</div>

<script>
    // ⚠️ REPLACE THIS WITH YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP URL
    const API_URL = "https://script.google.com/macros/s/AKfycbwdrjNcPErvDtCk0KXBs4CM75vvWsqM0TJGGodVTmrqihNFVS0isglPw1X5qdefbhjQ-w/exec";

    const form = document.getElementById('expenseForm');
    const loadingStatus = document.getElementById('loadingStatus');
    const expensesLog = document.getElementById('expensesLog');
    const payerSelect = document.getElementById('payer');
    const splitContainer = document.getElementById('splitWithContainer');

    // Fetch master configuration data (Users + History) on page load
    function loadInitialData() {
        fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            // 1. Populate Dropdowns and Checkboxes from Users Tab
            populateUserInterfaces(data.users);
            
            // 2. Populate History Feed
            displayHistory(data.transactions);
        })
        .catch(err => {
            console.error(err);
            expensesLog.innerHTML = 'Data load failed. Check Web App URL arrangement.';
        });
    }

    function populateUserInterfaces(users) {
        if (!users || users.length === 0) {
            payerSelect.innerHTML = '<option value="">No users found in Sheet</option>';
            splitContainer.innerHTML = 'No users found in Sheet';
            return;
        }

        // Setup the main payer dropdown selector
        payerSelect.innerHTML = '<option value="">-- Choose Payer --</option>';
        users.forEach(user => {
            const opt = document.createElement('option');
            opt.value = user;
            opt.textContent = user;
            payerSelect.appendChild(opt);
        });

        // Setup the split checkboxes system
        splitContainer.innerHTML = '';
        users.forEach(user => {
            const label = document.createElement('label');
            label.className = 'checkbox-item';
            label.innerHTML = `<input type="checkbox" name="splitUsers" value="${user}"> ${user}`;
            splitContainer.appendChild(label);
        });
    }

    function displayHistory(transactions) {
        expensesLog.innerHTML = '';
        if (!transactions || transactions.length === 0) {
            expensesLog.innerHTML = 'No transactions recorded yet.';
            return;
        }
        const recent = transactions.slice(-5).reverse();
        recent.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<strong>${item.Payer}</strong> paid <strong>$${parseFloat(item.Amount).toFixed(2)}</strong> for <em>${item.Description}</em><br><small>Split with: ${item.SplitWith}</small>`;
            expensesLog.appendChild(div);
        });
    }

    // Handle Form Submission
    form.addEventListener('submit', function(e) {
        e.preventDefault();

        // Gather all checked users from checkboxes
        const checkedBoxes = document.querySelectorAll('input[name="splitUsers"]:checked');
        const selectedUsers = Array.from(checkedBoxes).map(cb => cb.value);

        if (selectedUsers.length === 0) {
            alert('Please select at least one person to split the expense with!');
            return;
        }

        loadingStatus.style.display = 'block';

        const payload = {
            payer: payerSelect.value,
            amount: document.getElementById('amount').value.trim(),
            description: document.getElementById('description').value.trim(),
            splitWith: selectedUsers.join(', ') // Formats as a clean "Alice, Bob" string
        };

        fetch(API_URL, {
            method: 'POST',
            redirect: 'follow',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            loadingStatus.style.display = 'none';
            if(data.status === 'success') {
                alert('Expense successfully synced!');
                form.reset();
                loadInitialData(); // Force interface refresh
            } else {
                alert('Error: ' + data.message);
            }
        })
        .catch(err => {
            loadingStatus.style.display = 'none';
            console.error(err);
            alert('Sync failed.');
        });
    });

    // Initialize instantly
    loadInitialData();
</script>

</body>
</html>
