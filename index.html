<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Expense Splitter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2, h3 { margin-top: 0; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #2ecc71; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #27ae60; }
        .loading { display: none; text-align: center; color: #7f8c8d; font-style: italic; margin-top: 10px; }
        .history-list { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .history-item { background: #f9f9f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #3498db; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>💸 Splitwise Lite</h2>
    
    <!-- Expense Form -->
    <form id="expenseForm">
        <div class="form-group">
            <label for="payer">Who Paid?</label>
            <input type="text" id="payer" placeholder="e.g. Alice" required>
        </div>
        <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" step="0.01" placeholder="0.00" required>
        </div>
        <div class="form-group">
            <label for="description">For What?</label>
            <input type="text" id="description" placeholder="e.g. Dinner, Groceries" required>
        </div>
        <div class="form-group">
            <label for="splitWith">Split With (Comma separated)</label>
            <input type="text" id="splitWith" placeholder="e.g. Bob, Charlie" required>
        </div>
        <button type="submit">Sync Transaction</button>
        <div id="loadingStatus" class="loading">Processing... Please wait.</div>
    </form>

    <!-- Simple History Viewer -->
    <div class="history-list">
        <h3>Recent Expenses</h3>
        <div id="expensesLog">Loading history...</div>
    </div>
</div>

<script>
    // ⚠️ REPLACE THIS WITH YOUR DEPLOYED GOOGLE APPS SCRIPT WEB APP URL
    const API_URL = "https://script.google.com/macros/s/AKfycbwdrjNcPErvDtCk0KXBs4CM75vvWsqM0TJGGodVTmrqihNFVS0isglPw1X5qdefbhjQ-w/exec";

    const form = document.getElementById('expenseForm');
    const loadingStatus = document.getElementById('loadingStatus');
    const expensesLog = document.getElementById('expensesLog');

    // Handle Form Submission
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        loadingStatus.style.display = 'block';

        const payload = {
            payer: document.getElementById('payer').value.trim(),
            amount: document.getElementById('amount').value.trim(),
            description: document.getElementById('description').value.trim(),
            splitWith: document.getElementById('splitWith').value.trim()
        };

        fetch(API_URL, {
            method: 'POST',
            redirect: 'follow', // Crucial to handle Google Apps Script redirects
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            loadingStatus.style.display = 'none';
            if(data.status === 'success') {
                alert('Expense successfully synced!');
                form.reset();
                fetchHistory(); // Refresh the visual history log
            } else {
                alert('Error: ' + data.message);
            }
        })
        .catch(err => {
            loadingStatus.style.display = 'none';
            console.error(err);
            alert('Sync failed. Check console or Web App URL config.');
        });
    });

    // Fetch and show recent transactions from the Google Sheet
    function fetchHistory() {
        fetch(API_URL)
        .then(res => res.json())
        .then(data => {
            expensesLog.innerHTML = '';
            if (data.length === 0) {
                expensesLog.innerHTML = 'No transactions recorded yet.';
                return;
            }
            // Display transactions (showing the last 5 items)
            const recent = data.slice(-5).reverse();
            recent.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<strong>${item.Payer}</strong> paid <strong>$${parseFloat(item.Amount).toFixed(2)}</strong> for <em>${item.Description}</em><br><small>Split with: ${item.SplitWith}</small>`;
                expensesLog.appendChild(div);
            });
        })
        .catch(err => {
            expensesLog.innerHTML = 'Could not load expense history.';
            console.error(err);
        });
    }

    // Load transaction log immediately on page load
    fetchHistory();
</script>

</body>
</html>
